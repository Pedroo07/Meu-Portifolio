<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Filtro para o efeito neon -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Símbolo </> com efeito neon em azul escuro -->
  <g filter="url(#neon-glow)">
    <!-- < -->
    <path d="M 35 30 L 20 50 L 35 70"
          stroke="#1e3a8a"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- / -->
    <line x1="45" y1="70" x2="55" y2="30"
          stroke="#1e3a8a"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- > -->
    <path d="M 65 30 L 80 50 L 65 70"
          stroke="#1e3a8a"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Camada extra de brilho neon -->
  <g opacity="0.6">
    <path d="M 35 30 L 20 50 L 35 70"
          stroke="#2563eb"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
    <line x1="45" y1="70" x2="55" y2="30"
          stroke="#2563eb"
          stroke-width="3"
          stroke-linecap="round"/>
    <path d="M 65 30 L 80 50 L 65 70"
          stroke="#2563eb"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>
</svg>
